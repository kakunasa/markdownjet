<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- JetBrains-style diagonal 3-stop gradient -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FF6B35"/>
      <stop offset="50%"  stop-color="#F72585"/>
      <stop offset="100%" stop-color="#7209B7"/>
    </linearGradient>

    <!-- Subtle top-left highlight gives the dark bg a hint of depth -->
    <radialGradient id="glow" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base dark rounded square -->
  <rect width="128" height="128" rx="26" fill="#0F0F1A"/>
  <rect width="128" height="128" rx="26" fill="url(#glow)"/>
  <!-- Hairline inner stroke for crispness on light backdrops -->
  <rect x="0.5" y="0.5" width="127" height="127" rx="25.5" fill="none"
        stroke="#FFFFFF" stroke-opacity="0.06"/>

  <!-- Geometric "M" — the protagonist, in vivid gradient -->
  <path d="M 22 92 L 22 36 L 50 70 L 78 36 L 78 92"
        fill="none" stroke="url(#grad)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Markdown's signature down arrow, in clean white -->
  <path d="M 100 38 L 100 86 M 88 74 L 100 86 L 112 74"
        fill="none" stroke="#FFFFFF" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- A slim "jet trail" — 3 thin diagonal lines bleeding off the M's right
       side, matching the M's gradient. Conveys speed/jet without clutter. -->
  <g stroke="url(#grad)" stroke-linecap="round">
    <line x1="78" y1="100" x2="92" y2="100" stroke-width="3" stroke-opacity="0.85"/>
    <line x1="68" y1="108" x2="82" y2="108" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="58" y1="116" x2="72" y2="116" stroke-width="3" stroke-opacity="0.30"/>
  </g>
</svg>
